name: Publish to NPM

on:
  push:
    branches:
      - main  # Change par 'master' si ta branche principale s'appelle master
    paths:
      - 'package.json' # Optionnel: ne lance le workflow que si tu as touché au package.json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
